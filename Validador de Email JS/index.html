<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro</title>
    <!-- Enlace al archivo CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="login-card">
        <h2>Bienvenido</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="text" id="email" name="email" autocomplete="off">
                <span id="emailError" class="message error">Por favor, ingrese un correo válido.</span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password">
                <span id="passwordError" class="message error">La contraseña debe tener al menos 6 caracteres.</span>
            </div>

            <button type="submit">Iniciar Sesión</button>
            <p id="successMessage" class="message success">Acceso correcto. Redirigiendo...</p>
        </form>
    </div>

    <!-- Enlace al archivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
